name: Telegram Product Poster

# Запускается каждый час в окне 09:00–18:00 по Ташкенту (UTC+5 → 04–13 UTC).
# Бот сам выбирает 2 случайных часа для товарных постов, а поздравления
# публикует один раз в день праздника (с 09:00), поэтому частые запуски нужны.
on:
  schedule:
    - cron: "0 4-13 * * *"
  workflow_dispatch:
    inputs:
      test_holiday:
        description: "Тест поздравления (none = обычный запуск)"
        required: false
        default: none
        type: choice
        options:
          - none
          - new_year
          - defenders
          - march8
          - navruz
          - memory_day
          - independence
          - teachers_day
          - constitution
          - ramazan
          - kurban

permissions:
  contents: write          # чтобы коммитить posted.json / state.json / holidays.json

# Не запускать два прогона одновременно — иначе конфликт при push.
concurrency:
  group: telegram-poster
  cancel-in-progress: false

jobs:
  post-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Шрифт с кириллицей для праздничных открыток. Не критично: если не
      # поставится, поздравление просто выйдет текстом.
      - name: Install fonts for greeting cards
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core || true

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pillow "python-telegram-bot>=20"

      - name: Run parser and post to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}   # необязательно
          TEST_CHAT_ID: ${{ secrets.TEST_CHAT_ID }}     # необязательно: куда слать тест
          FORCE_HOLIDAY: ${{ github.event.inputs.test_holiday }}
        run: python script.py

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add posted.json state.json holidays.json || true
          if git diff --cached --quiet; then
            echo "Состояние не изменилось — коммитить нечего."
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"

          # Пушим с повторами. Если кто-то успел запушить в main раньше —
          # подтягиваем его изменения, в файлах состояния оставляем нашу версию.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Состояние сохранено."
              exit 0
            fi
            echo "Push отклонён (попытка $attempt) — синхронизируюсь с origin/main…"
            git fetch origin main || true
            git merge -X ours --no-edit FETCH_HEAD || git merge --abort || true
          done

          echo "Не удалось сохранить состояние после нескольких попыток."
          exit 1
