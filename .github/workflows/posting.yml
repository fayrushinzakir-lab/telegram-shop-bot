name: Telegram Product Poster

on:
  schedule:
    # Каждые 30 минут — чтобы не проспать слот, если GitHub опаздывает
    - cron: "*/30 * * * *"
  workflow_dispatch:

# Не запускать параллельно — иначе будут конфликты при git push
concurrency:
  group: telegram-poster
  cancel-in-progress: false

jobs:
  post-products:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # fetch-depth: 0 не нужен, нам хватает последнего коммита

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser and post to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python script.py

      - name: Commit state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.json state.json
          # Коммит только если есть изменения
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            # Пуллим перед пушем на случай конкурентного коммита
            git pull --rebase origin main || true
            git push
          else
            echo "Нет изменений в state — пропускаем коммит"
          fi
