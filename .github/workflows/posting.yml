name: Telegram Product Poster

# Запускается каждый час в окне 09:00–18:00 по Ташкенту (UTC+5 → 04–13 UTC).
# Бот сам решает, в какие 2 случайных часа постить, поэтому частые запуски нужны,
# чтобы он успел «поймать» запланированные слоты.
on:
  schedule:
    - cron: "0 4-13 * * *"
  workflow_dispatch: {}   # ручной запуск кнопкой в интерфейсе Actions

permissions:
  contents: write          # чтобы коммитить posted.json / state.json

concurrency:
  group: telegram-poster   # не запускать два прогона одновременно (конфликт push)
  cancel-in-progress: false

jobs:
  post-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 "python-telegram-bot>=20"

      - name: Run parser and post to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}   # необязательно
        run: python script.py

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json state.json || true
          if git diff --cached --quiet; then
            echo "Состояние не изменилось — коммит не нужен."
          else
            git commit -m "chore: update state [skip ci]"
            git push
          fi
